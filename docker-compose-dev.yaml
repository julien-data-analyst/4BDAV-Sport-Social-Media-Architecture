services:

  # 1ère partie : création des services principaux

  # Service pour la création de dashboard
  grafana:
    build: 
        context: ./grafana
    container_name: grafana-dashboard-sensor-monitoring
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/datasources/:/etc/grafana/provisioning/datasources/ # Insertion des sources de données et leurs connexions
      - ./grafana/dashboard/:/etc/grafana/provisioning/dashboards/ # Insertion des dashboards via l'export JSON
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}

  # Service pour le développement des scripts avec Marimo
  marimo:
    build:
      context: ./marimo-dev
      args:
        PYTHON_VERSION: ${PYTHON_VERSION}
    container_name: marimo-dev
    command: marimo edit --no-token --host 0.0.0.0 -p 8080
    env_file:
      - .env
    volumes:
      - ./marimo-dev/scripts:/code/scripts
    working_dir: /code
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true

  # Service pour la création de la base de données SQL
  postgres:
    build: 
      context: ./postgresql
    container_name: postgres_social_media
    environment:
      POSTGRES_DB: social_media_sports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5532:5432"
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/scripts/initdb/:/docker-entrypoint-initdb.d/
      - ./postgresql/scripts/inserts/:/inserts/
      - ./postgresql/scripts/config/:/etc/postgresql/
  
  # Service pour la création de la base de données Redis
  redis:
    build: 
      context: ./redis
    container_name: redis_social_media
    env_file:
      - .env
    ports:
      - "6379:6379"
    entrypoint: ["sh", "/entrypoint.sh"]
    volumes:
      - ./redis/data/:/test_data/
      - ./redis/backup/data/:/data/
      - ./redis/config/redis.conf.template:/redis.conf.template
      - ./redis/entrypoint/entrypoint.sh:/entrypoint.sh

  # Service pour la création de la base de données InfluxDB
  influxdb:
    build: ./influxdb
    container_name: influxdb_sensors_activity
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb/sensor:/data/sensor
      - ./influxdb/monitoring:/data/monitoring
      - ./influxdb/config/config.toml:/etc/influxdb/config.toml
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG}
      DOCKER_INFLUXDB_INIT_RETENTION: 168h 
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN}

  # Service pour exécuter les scripts de génération de données et insertion dans les bdd correspondantes
  python:
    build:
      context: ./python-dev
    container_name: python-dev
    command: 
    env_file:
      - .env
    volumes:
      - ./python-dev/scripts:/code
    working_dir: /code
    stdin_open: true
    tty: true

  # 2ème partie : création des backups 

  # Création du backup sous SQL
  postgres-backup:
    image: postgres:16
    env_file:
      - .env
    depends_on:
      - postgres
    volumes:
      - ./postgresql/scripts/backup/data/:/backup/
      - ./postgresql/scripts/backup/backup.sh:/backup.sh
    environment:
      PGPASSWORD: postgres
    entrypoint: ["bash", "./backup.sh"]

  # Création du backup sous Redis
  redis-backup:
    image: redis:7
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./redis/backup/data/:/backup_data/
      - ./redis/backup/backup.sh:/backup.sh

    command: ["bash", "../backup.sh"]

  # Création du backup sous InfluxDB
  influx-backup:
    image: influxdb:2.7
    env_file:
      - .env
    depends_on:
      - influxdb
    volumes:
      - ./influxdb/backup/influx:/backup
      - ./influxdb/backup/backup.sh:/backup.sh
    environment:
      INFLUX_TOKEN: my-super-token
    entrypoint: ["bash", "./backup.sh"]

  # Création du backup sous Grafana
  grafana-backup:
    image: alpine
    container_name: grafana-backup
    depends_on:
      - grafana
    volumes:
    - ./grafana/grafana-data:/var/lib/grafana
    - ./grafana/backup/data:/backup
    - ./grafana/backup/backup.sh:/backup.sh
    entrypoint: ["sh", "/backup.sh"]

  # 3ème partie : Création des tokens de lecture et d'écriture seulement sur InfluxDB

  # Création des tokens de lecture et d'écriture pour InfluxDB
  influx-init:
    image: influxdb:2.7
    env_file:
      - .env
    depends_on:
      - influxdb
    volumes:
      - ./influxdb/initdb/token_creation.sh:/token_creation.sh
    entrypoint: ["sh", "/token_creation.sh"]

# Création des volumes
volumes:
  postgres_data:
  redis_data:
  influxdb_data:
  grafana-data: